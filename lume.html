<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Lume menu bez Vue</title>

<!-- LUME -->
<script src="https://unpkg.com/lume@0.3.0-alpha.27/dist/global.js"></script>

<!-- Tween.js -->
<script src="https://unpkg.com/tween.js@16.6.0/src/Tween.js"></script>

<!-- Pointer Events polyfill (Safari < 13) -->
<script src="https://code.jquery.com/pep/0.4.3/pep.js"></script>

<script>
    LUME.defineElements()
</script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins&display=swap');
    body,
    html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
        background: black;
    }
    lume-element3d {
        text-align: center;
    }
    button {
        width: 100%;
        height: 100%;
        white-space: nowrap;
        border-radius: 10px;
        border: none;
        background: #595c5e;
        color: #ccc;
        outline: none;
        font-family: 'Poppins', sans-serif;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
    }
    button:focus,
    button:hover {
        background: #617e9f;
    }
</style>
</head>
<body>

<form style="display: contents" onsubmit="console.log('Native form submission!'); event.preventDefault()">
    <div style="width: 100%; height: 100%;">
        <lume-scene
            webgl="true"
            id="scene"
            background-color="black"
            background-opacity="0"
            perspective="600"
            shadowmap-type="pcfsoft"
            touch-action="none"
            physically-correct-lights
        >
            <lume-ambient-light color="#ffffff" intensity="2"></lume-ambient-light>

            <lume-plane
                id="background"
                size-mode="literal literal"
                size="300 300 0"
                align-point="0.5 0.5"
                mount-point="0.5 0.5"
                has="phong-material"
                color="white"
                dithering
                texture="https://assets.codepen.io/191583/cement_wall_diff_2k.jpg"
                bump-map="https://assets.codepen.io/191583/cement_wall_disp_2k.jpg"
                bump-scale="8"
                shininess="75"
                specular="#222"
            >
                <lume-element3d
                    id="button-container"
                    position="0 0 20"
                    size="520 38 0"
                    align-point="0.5 0.5 0"
                    mount-point="0.5 0.5 0"
                >
                    <!-- 4 przyciski zamiast v-for -->
                    <lume-mixed-plane
                        class="btn-plane"
                        size-mode="literal proportional"
                        size="120 1 0"
                        align-point="0 0 0"
                        mount-point="0 0 0"
                        color="#444"
                        has="rounded-rectangle-geometry"
                        corner-radius="10"
                        thickness="1"
                        quadratic-corners="false"
                        roughness="0.48"
                    >
                        <button>🏖️ Have Fun</button>
                    </lume-mixed-plane>

                    <lume-mixed-plane
                        class="btn-plane"
                        size-mode="literal proportional"
                        size="120 1 0"
                        align-point="0.333 0 0"
                        mount-point="0.333 0 0"
                        color="#444"
                        has="rounded-rectangle-geometry"
                        corner-radius="10"
                        thickness="1"
                        quadratic-corners="false"
                        roughness="0.48"
                    >
                        <button>😊 Smi)e</button>
                    </lume-mixed-plane>

                    <lume-mixed-plane
                        class="btn-plane"
                        size-mode="literal proportional"
                        size="120 1 0"
                        align-point="0.666 0 0"
                        mount-point="0.666 0 0"
                        color="#444"
                        has="rounded-rectangle-geometry"
                        corner-radius="10"
                        thickness="1"
                        quadratic-corners="false"
                        roughness="0.48"
                    >
                        <button>🛠️ Create</button>
                    </lume-mixed-plane>

                    <lume-mixed-plane
                        class="btn-plane"
                        size-mode="literal proportional"
                        size="120 1 0"
                        align-point="0.999 0 0"
                        mount-point="0.999 0 0"
                        color="#444"
                        has="rounded-rectangle-geometry"
                        corner-radius="10"
                        thickness="1"
                        quadratic-corners="false"
                        roughness="0.48"
                    >
                        <button>♥️ With Love</button>
                    </lume-mixed-plane>
                </lume-element3d>
            </lume-plane>

            <lume-element3d id="lightContainer" size="0 0 0" position="0 0 300">
                <lume-point-light
                    id="light"
                    color="white"
                    size="0 0 0"
                    position="-50 -50"
                    intensity="318.3098861837907"
                    shadow-map-width="2048"
                    shadow-map-height="2048"
                    shadow-radius="10"
                    distance="800"
                    shadow-bias="-0.001"
                >
                    <lume-mesh
                        id="bulb"
                        has="sphere-geometry basic-material"
                        size="10 10 10"
                        mount-point="0.5 0.5 0.5"
                        color="white"
                        receive-shadow="false"
                        cast-shadow="false"
                        style="pointer-events: none"
                        visible="false"
                    ></lume-mesh>
                </lume-point-light>
            </lume-element3d>
        </lume-scene>
    </div>
</form>

<script type="module">
    const { Motor } = LUME

    const scene = document.getElementById('scene')
    const lightContainer = document.getElementById('lightContainer')
    const plane = document.getElementById('background')

    const targetPosition = { x: window.innerWidth / 2, y: window.innerHeight / 2 }

    let pressedButton = null
    let downTween = null
    let upTween = null

    // animacja światła i rotacji plane
    Motor.addRenderTask(time => {
        lightContainer.position.x += (targetPosition.x - lightContainer.position.x) * 0.05
        lightContainer.position.y += (targetPosition.y - lightContainer.position.y) * 0.05

        plane.rotation.y = 10 * (lightContainer.position.x / window.innerWidth) - 5
        plane.rotation.x = -(10 * (lightContainer.position.y / window.innerHeight) - 5)
    })

    function resize() {
        const winAspect = window.innerWidth / window.innerHeight
        if (winAspect < 1) plane.size = [window.innerHeight * 1.3, window.innerHeight * 1.3]
        else plane.size = [window.innerWidth * 1.3, window.innerWidth * 1.3]
    }

    window.addEventListener('resize', resize)
    resize()

    function onmove(e) {
        e.preventDefault()
        targetPosition.x = e.clientX
        targetPosition.y = e.clientY
    }

    function ondown(e) {
        if (e.target.matches('button')) {
            pressedButton = e.target

            if (upTween) {
                upTween.stop()
                upTween = null
            }

            downTween = new TWEEN.Tween(e.target.parentNode.position)
                .to({ z: -16 }, 75)
                .start()
                .onComplete(() => (downTween = null))

            Motor.addRenderTask(time => {
                if (!downTween) return false
                downTween.update(time)
            })
        }
    }

    function onup() {
        if (pressedButton) {
            if (downTween) {
                downTween.stop()
                downTween = null
            }

            upTween = new TWEEN.Tween(pressedButton.parentNode.position)
                .to({ z: 0 }, 75)
                .start()
                .onComplete(() => (upTween = null))

            Motor.addRenderTask(time => {
                if (!upTween) return false
                upTween.update(time)
            })
        }
    }

    scene.addEventListener('pointermove', onmove)
    scene.addEventListener('pointerdown', ondown)
    scene.addEventListener('pointerup', onup)
</script>

</body>
</html>
